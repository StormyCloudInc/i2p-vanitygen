name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev ocl-icd-opencl-dev

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          LDFLAGS="-s -w -X github.com/go-i2p/i2p-vanitygen/internal/version.Version=${{ github.ref_name }}"
          go build -trimpath -ldflags "${LDFLAGS}" -o "vanitygenerator_linux_signed" .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-linux
          path: vanitygenerator_linux_signed

  build-windows:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Set version in Windows resources
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $parts = $tag -split '\.'
          while ($parts.Count -lt 4) { $parts += "0" }
          $ver = ($parts[0..3]) -join '.'
          Write-Host "Setting Windows file version to $ver"
          $json = Get-Content winres\winres.json -Raw
          $json = $json -replace '"file_version": "0\.0\.0\.0"', "`"file_version`": `"$ver`""
          $json = $json -replace '"product_version": "0\.0\.0\.0"', "`"product_version`": `"$ver`""
          $json = $json -replace '"version": "0\.0\.0\.0"', "`"version`": `"$ver`""
          $json | Set-Content winres\winres.json -NoNewline
          Write-Host "Updated winres.json:"
          Get-Content winres\winres.json
        shell: powershell

      - name: Generate OpenCL import library
        run: |
          $gccDir = Split-Path (Get-Command gcc).Source
          $libDir = Join-Path (Split-Path $gccDir) "lib"
          gendef C:\Windows\System32\OpenCL.dll
          dlltool -d OpenCL.def -l libOpenCL.a
          Copy-Item libOpenCL.a $libDir
          Write-Host "Installed libOpenCL.a to $libDir"
        shell: powershell

      - name: Generate Windows resources
        run: |
          go install github.com/tc-hib/go-winres@v0.3.1
          go-winres make
        shell: cmd

      - name: Build
        run: |
          set GOOS=windows
          set GOARCH=amd64
          set CGO_ENABLED=1
          set CC=gcc
          go build -trimpath -ldflags "-H=windowsgui -s -w -X github.com/go-i2p/i2p-vanitygen/internal/version.Version=${{ github.ref_name }}" -o "vanitygenerator_windows_signed.exe" .
        shell: cmd

      - name: Sign Windows binary
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: powershell -ExecutionPolicy Bypass -File ".github/scripts/sign-exe.ps1" -BinaryPath "vanitygenerator_windows_signed.exe"
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-windows
          path: vanitygenerator_windows_signed.exe

  build-macos:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Build
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: clang
        run: |
          LDFLAGS="-s -w -X github.com/go-i2p/i2p-vanitygen/internal/version.Version=${{ github.ref_name }}"
          go build -trimpath -ldflags "${LDFLAGS}" -o "vanitygenerator" .

      - name: Create app icon
        run: |
          ICONSET="AppIcon.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     winres/icon16.png  --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     winres/icon32.png  --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     winres/icon32.png  --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     winres/icon64.png  --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   winres/icon128.png --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   winres/icon256.png --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   winres/icon256.png --out "$ICONSET/icon_256x256.png"
          sips -z 256 256   winres/icon256.png --out "$ICONSET/icon_256x256@2x.png"
          sips -z 256 256   winres/icon256.png --out "$ICONSET/icon_512x512.png"
          sips -z 256 256   winres/icon256.png --out "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o AppIcon.icns

      - name: Create app bundle
        run: |
          APP="Vanity Domain Generator.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp vanitygenerator "$APP/Contents/MacOS/"
          cp AppIcon.icns "$APP/Contents/Resources/"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed "s/VERSION/$VERSION/g" darwin/Info.plist > "$APP/Contents/Info.plist"

      - name: Unlock keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db
          security find-identity -v -p codesigning

      - name: Sign app bundle
        run: |
          IDENTITY_HASH=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Using identity: $IDENTITY_HASH"
          codesign --force --deep --options runtime --timestamp \
            --sign "$IDENTITY_HASH" \
            "Vanity Domain Generator.app"
          echo "Verifying signature..."
          codesign -dv --verbose=2 "Vanity Domain Generator.app"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Vanity Domain Generator" \
            --window-pos 200 120 \
            --window-size 540 380 \
            --icon-size 80 \
            --icon "Vanity Domain Generator.app" 130 175 \
            --app-drop-link 410 175 \
            "vanitygenerator_mac_silicon_signed.dmg" \
            "Vanity Domain Generator.app"

      - name: Notarize DMG
        run: |
          xcrun notarytool submit "vanitygenerator_mac_silicon_signed.dmg" \
            --keychain-profile "i2p-notary" --wait
          echo "Notarization complete"

      - name: Staple notarization ticket
        run: xcrun stapler staple "vanitygenerator_mac_silicon_signed.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-macos
          path: vanitygenerator_mac_silicon_signed.dmg

  sign-linux:
    needs: build-linux
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: vanitygenerator-linux

      - name: Sign Linux binary (detached PKCS#7)
        env:
          CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        run: powershell -ExecutionPolicy Bypass -File ".github/scripts/sign-detached.ps1" -FilePath "vanitygenerator_linux_signed"
        shell: cmd

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-linux-signed
          path: |
            vanitygenerator_linux_signed
            vanitygenerator_linux_signed.p7s

  release:
    needs: [build-windows, build-macos, sign-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: VirusTotal Scan
        id: virustotal
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            artifacts/vanitygenerator_windows_signed.exe
            artifacts/vanitygenerator_linux_signed
            artifacts/vanitygenerator_mac_silicon_signed.dmg

      - name: Parse VirusTotal results
        id: vt_links
        run: |
          ANALYSIS="${{ steps.virustotal.outputs.analysis }}"
          BODY=""
          IFS=',' read -ra ENTRIES <<< "$ANALYSIS"
          for entry in "${ENTRIES[@]}"; do
            FILE=$(echo "$entry" | cut -d'=' -f1 | xargs basename)
            URL=$(echo "$entry" | cut -d'=' -f2-)
            BODY="${BODY}- [\`${FILE}\`](${URL})"$'\n'
          done
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "links<<$EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Vanity Domain Generator ${{ github.ref_name }}

            Generate vanity I2P (.b32.i2p) and Tor v3 (.onion) addresses with a custom prefix. GPU accelerated on macOS (Metal) and Windows/Linux (OpenCL).

            ### Downloads

            | Platform | Architecture | File | Signed |
            |----------|-------------|------|--------|
            | Windows | amd64 | `vanitygenerator_windows_signed.exe` | Authenticode |
            | macOS | arm64 (Apple Silicon) | `vanitygenerator_mac_silicon_signed.dmg` | Notarized + Stapled |
            | Linux | amd64 | `vanitygenerator_linux_signed` | PKCS#7 (`.p7s`) |

            ### VirusTotal Analysis

            ${{ steps.vt_links.outputs.links }}

            ### Verify

            **Windows** — signature is embedded (right-click → Properties → Digital Signatures)

            **macOS** — notarized and stapled:
            ```
            spctl -a -t open --context context:primary-signature vanitygenerator_mac_silicon_signed.dmg
            ```

            **Linux** — verify the detached PKCS#7 signature:
            ```
            openssl cms -verify -in vanitygenerator_linux_signed.p7s -content vanitygenerator_linux_signed -inform DER -noverify
            ```

            **Checksums:**
            ```
            sha256sum -c checksums.txt --ignore-missing
            ```
